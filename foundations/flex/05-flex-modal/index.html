<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Modal</title>
  </head>
  <body>
    <div class="modal">
      <div class="top">
        <div class="icon">!</div>
        <div class="header">Are you sure you want to do that?</div>
        <button class="close-button">✖</button>
      </div>
      <div class="text">So, if you click this button. You will die. Yeah, you will literally just die. There's no way around it. Doesn't work if you are suicidal.</div>
      <div class="buttons">
        <button class="continue">Continue</button>
        <button class="cancel">Cancel</button>
      </div>
    </div>
  </body>
</html>
